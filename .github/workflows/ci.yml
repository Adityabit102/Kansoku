name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install numpy scipy scikit-learn statsmodels PyWavelets pandas pyarrow \
            requests fastapi "uvicorn[standard]" pydantic joblib python-multipart \
            tensorflow-cpu pytest httpx ruff
      - name: Lint
        run: ruff check kansoku tests
      # API tests self-skip without trained artifacts; the signal-processing and
      # statistics suites are pure unit tests and always run.
      - name: Test
        run: PYTHONPATH=. pytest tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npx eslint .
      - name: Build
        run: npm run build
