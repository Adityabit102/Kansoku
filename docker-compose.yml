services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # The package lives at /app/kansoku; without this the config would
      # derive paths from the filesystem root instead of the mounts below.
      KANSOKU_ROOT: /app
    volumes:
      # Mounted, not baked in: retraining never requires an image rebuild.
      - ./artifacts:/app/artifacts
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
