# Render free-tier blueprint: deploy with "New +" -> Blueprint, or create a
# Web Service manually with these settings. TensorFlow is excluded from the
# 512MB host; the MLP serves from exported NumPy weights (bit-identical
# outputs, see kansoku/models/export_mlp.py) so all six models run.
services:
  - type: web
    name: kansoku-api
    runtime: python
    plan: free
    buildCommand: pip install -r render-requirements.txt
    startCommand: PYTHONPATH=backend KANSOKU_ROOT=. uvicorn kansoku.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        sync: false
